<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Arrow Hunter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    overflow:hidden;
    user-select:none;
    touch-action:none;
    background:#0d1b2a;
    font-family:Georgia,serif;
  }
  canvas { display:block; position:fixed; inset:0; }

  #ui {
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    display:flex; gap:18px; align-items:center;
    background:rgba(255,255,255,0.14); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.28); border-radius:999px;
    padding:8px 20px; color:white; font-size:14px;
    text-shadow:0 1px 3px rgba(0,0,0,0.35); z-index:20; white-space:nowrap;
  }
  #ui b { font-size:18px; color:#ffd166; }

  #power-btn {
    border:none; background:rgba(255,255,255,0.12); color:white;
    border-radius:999px; padding:6px 12px; font:inherit; cursor:pointer;
    border:1px solid rgba(255,255,255,0.18);
  }
  #power-btn span { color:#ffd166; font-weight:700; }

  #help {
    position:fixed; top:58px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,0.9); font-size:12px; z-index:20;
    text-shadow:0 1px 2px rgba(0,0,0,0.45);
  }

  #msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.82); color:white; font-size:24px;
    padding:20px 34px; border-radius:18px; display:none;
    text-align:center; z-index:30; white-space:pre-line; line-height:1.55;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
  }

  #restart-btn {
    position:fixed; bottom:24px; right:24px; z-index:25;
    background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.35);
    border-radius:14px; padding:10px 18px; color:white; font-size:14px;
    display:none; cursor:pointer; backdrop-filter:blur(6px);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">🏹 Score:<b id="score">0</b> &nbsp;Arrows:<b id="arrows">12</b> &nbsp;Level:<b id="level">1</b> <button id="power-btn" type="button">Throw: <span id="throw-mode">Mid</span></button></div>
<div id="help">Aim with mouse or finger. Click, tap, or press Space to shoot.</div>
<div id="msg"></div>
<button id="restart-btn" onclick="location.reload()">🔄 Restart</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

const state = {
  score: 0,
  arrows: 12,
  level: 1,
  throwMode: 1,
  gameOver: false,
  aimX: 0,
  aimY: 0,
  aimed: false,
  lastShotAt: 0,
  fireCooldown: 180,
};

const clouds = Array.from({ length: 8 }, () => ({
  x: Math.random() * 900,
  y: 50 + Math.random() * 180,
  w: 80 + Math.random() * 130,
  h: 28 + Math.random() * 30,
  speed: 0.15 + Math.random() * 0.22,
}));

const birds = [];
const arrows = [];
const particles = [];
let spawnTimer = 0;
let windPhase = 0;

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function updateUI() {
  document.getElementById('score').textContent = state.score;
  document.getElementById('arrows').textContent = state.arrows;
  document.getElementById('level').textContent = state.level;
  document.getElementById('throw-mode').textContent = ['Low', 'Mid', 'High'][state.throwMode];
}

let msgTO;
function showMsg(txt, dur) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.style.display = 'block';
  clearTimeout(msgTO);
  if (dur) msgTO = setTimeout(() => { el.style.display = 'none'; }, dur);
}

function endGame(won) {
  state.gameOver = true;
  document.getElementById('restart-btn').style.display = 'block';
  showMsg((won ? '🏆 YOU WIN!' : '💔 GAME OVER') + '\nScore: ' + state.score + '\n\nTap Restart or press R');
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = rand(1.2, 4.3);
    particles.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      color,
      size: rand(1.5, 4.5),
    });
  }
}

function spawnBird(startOnScreen = false) {
  const side = Math.random() < 0.5 ? -1 : 1;
  const speed = rand(1.1, 2.2) + state.level * 0.16;
  const onScreenY = rand(H() * 0.14, H() * 0.42);
  birds.push({
    x: startOnScreen ? rand(W() * 0.15, W() * 0.85) : (side < 0 ? -80 : W() + 80),
    y: startOnScreen ? onScreenY : rand(70, H() * 0.48),
    vx: side * speed,
    flap: Math.random() * Math.PI * 2,
    size: rand(18, 28),
    hue: rand(0.92, 1.08),
    alive: true,
  });
}

function shootArrow() {
  if (state.gameOver) return;
  const now = performance.now();
  if (now - state.lastShotAt < state.fireCooldown) return;
  if (state.arrows <= 0) {
    showMsg('No arrows left.\nHit more birds to keep going.', 1400);
    return;
  }

  state.lastShotAt = now;
  state.arrows--;

  const bowX = W() * 0.5;
  const bowY = H() * 0.84;
  const dx = state.aimed ? state.aimX - bowX : 1;
  const dy = state.aimed ? state.aimY - bowY : -120;
  const length = Math.hypot(dx, dy) || 1;
  const throws = [
    { speed: 9.5, gravity: 0.12, drag: 0.996 },
    { speed: 12.5, gravity: 0.09, drag: 0.997 },
    { speed: 15.5, gravity: 0.064, drag: 0.998 },
  ];
  const throwConfig = throws[state.throwMode];
  const verticalBias = state.throwMode === 0 ? 55 : state.throwMode === 2 ? -55 : 0;

  arrows.push({
    x: bowX,
    y: bowY,
    vx: (dx / length) * throwConfig.speed,
    vy: ((dy + verticalBias) / length) * throwConfig.speed,
    angle: Math.atan2(dy, dx),
    speed: throwConfig.speed,
    gravity: throwConfig.gravity,
    drag: throwConfig.drag,
    life: 220,
    trail: [],
    stuck: false,
    spin: rand(-0.18, 0.18),
  });

  burst(bowX, bowY - 6, 'rgba(255,221,102,0.95)', 6);
  updateUI();
}

function birdShape(bird) {
  const { x, y, size, flap, hue } = bird;
  const wing = Math.sin(flap) * size * 0.42;
  const wingDrop = Math.cos(flap * 0.7) * size * 0.08;
  const bodyColor = `hsl(193, 58%, ${78 * hue}%)`;
  const wingColor = `hsl(184, 55%, ${66 * hue}%)`;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(bird.vx > 0 ? 1 : -1, 1);

  ctx.fillStyle = bodyColor;
  ctx.strokeStyle = '#8b5e34';
  ctx.lineWidth = Math.max(1.8, size * 0.1);

  ctx.beginPath();
  ctx.ellipse(-2, 1, size * 0.92, size * 0.65, -0.06, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = wingColor;
  ctx.beginPath();
  ctx.moveTo(-size * 0.05, -size * 0.08);
  ctx.quadraticCurveTo(-size * 0.6, -size * 1.02 - wing * 0.25, -size * 0.95, -size * 0.2 + wingDrop);
  ctx.quadraticCurveTo(-size * 0.48, -size * 0.02, -size * 0.05, -size * 0.08);
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-size * 0.24, -size * 0.04);
  ctx.quadraticCurveTo(-size * 0.88, -size * 0.2, -size * 1.18, -size * 0.52);
  ctx.quadraticCurveTo(-size * 0.74, -size * 0.1, -size * 0.24, -size * 0.04);
  ctx.fill();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-size * 0.18, size * 0.1);
  ctx.quadraticCurveTo(-size * 0.72, size * 0.44, -size * 1.02, size * 0.36);
  ctx.quadraticCurveTo(-size * 0.48, size * 0.06, -size * 0.18, size * 0.1);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#8b5e34';
  ctx.beginPath();
  ctx.moveTo(size * 0.58, -size * 0.02);
  ctx.lineTo(size * 1.02, size * 0.08);
  ctx.lineTo(size * 0.62, size * 0.24);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#fff7f0';
  ctx.beginPath();
  ctx.arc(size * 0.16, -size * 0.08, size * 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#3b2f2f';
  ctx.beginPath();
  ctx.arc(size * 0.19, -size * 0.08, size * 0.045, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#f4a7b9';
  ctx.beginPath();
  ctx.ellipse(size * 0.06, size * 0.08, size * 0.14, size * 0.1, -0.12, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#8b5e34';
  ctx.lineWidth = Math.max(1.2, size * 0.07);
  ctx.beginPath();
  ctx.moveTo(-size * 0.18, size * 0.58);
  ctx.lineTo(-size * 0.06, size * 0.86);
  ctx.lineTo(size * 0.02, size * 0.58);
  ctx.moveTo(size * 0.03, size * 0.58);
  ctx.lineTo(size * 0.15, size * 0.86);
  ctx.lineTo(size * 0.23, size * 0.58);
  ctx.stroke();

  if (Math.sin(flap * 1.1) > 0.88) {
    ctx.save();
    ctx.translate(size * 0.92, -size * 0.28);
    ctx.scale(0.85, 0.85);
    ctx.fillStyle = '#ef476f';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-6, -10, -20, -8, -20, 4);
    ctx.bezierCurveTo(-20, 16, -6, 22, 0, 30);
    ctx.bezierCurveTo(6, 22, 20, 16, 20, 4);
    ctx.bezierCurveTo(20, -8, 6, -10, 0, 0);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawArrow(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);
  const glow = 0.45 + Math.min(1, a.speed / 14);
  ctx.shadowColor = 'rgba(255,220,170,0.35)';
  ctx.shadowBlur = 12 * glow;
  ctx.strokeStyle = '#f4f1de';
  ctx.fillStyle = '#d4a373';
  ctx.lineWidth = 2.1;
  ctx.lineCap = 'round';

  const shaft = 22;
  ctx.beginPath();
  ctx.moveTo(-shaft * 0.4, 0);
  ctx.lineTo(shaft * 0.65, 0);
  ctx.stroke();

  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.strokeStyle = '#fff1c1';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-shaft * 0.45, 0);
  ctx.lineTo(shaft * 0.55, 0);
  ctx.stroke();
  ctx.restore();

  ctx.beginPath();
  ctx.moveTo(-shaft * 0.4, 0);
  ctx.lineTo(-shaft * 0.55, -4);
  ctx.lineTo(-shaft * 0.55, 4);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(shaft * 0.65, 0);
  ctx.lineTo(shaft * 0.98, -3.5);
  ctx.lineTo(shaft * 0.98, 3.5);
  ctx.closePath();
  ctx.fillStyle = '#9c6644';
  ctx.fill();

  ctx.strokeStyle = '#f8d7a2';
  ctx.beginPath();
  ctx.moveTo(-shaft * 0.2, 0);
  ctx.lineTo(-shaft * 0.05, -3);
  ctx.lineTo(0, 0);
  ctx.lineTo(-shaft * 0.05, 3);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();
}

function drawCrossbow(x, y, aimX, aimY) {
  const dx = aimX - x;
  const dy = aimY - y;
  const angle = Math.atan2(dy, dx);
  const pull = clamp(Math.hypot(dx, dy) / 220, 0, 1);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  ctx.shadowColor = 'rgba(0,0,0,0.18)';
  ctx.shadowBlur = 10;

  // stock and body
  ctx.fillStyle = '#5b3716';
  ctx.strokeStyle = '#8b5e34';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-90, -10, 108, 20, 10);
  ctx.fill();
  ctx.stroke();

  // grip / handle
  ctx.save();
  ctx.translate(-34, 18);
  ctx.rotate(-0.24);
  ctx.fillStyle = '#7a4a25';
  ctx.beginPath();
  ctx.roundRect(-13, -19, 26, 44, 10);
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // front core / rail
  ctx.fillStyle = '#3f2512';
  ctx.beginPath();
  ctx.roundRect(-8, -4, 112, 8, 4);
  ctx.fill();

  // limbs
  ctx.strokeStyle = '#8b5e34';
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.quadraticCurveTo(66 + pull * 8, -38 - pull * 6, 118, -30);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.quadraticCurveTo(66 + pull * 8, 38 + pull * 6, 118, 30);
  ctx.stroke();

  // string
  ctx.strokeStyle = 'rgba(255,240,220,0.95)';
  ctx.lineWidth = 1.7;
  ctx.beginPath();
  ctx.moveTo(118, -30);
  ctx.lineTo(109 + pull * 4, 0);
  ctx.lineTo(118, 30);
  ctx.stroke();

  // front sight and trigger details
  ctx.fillStyle = '#c9d6df';
  ctx.beginPath();
  ctx.arc(8, -14, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(40, -12, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#b07a47';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(118, -30);
  ctx.lineTo(129, -34);
  ctx.moveTo(118, 30);
  ctx.lineTo(129, 34);
  ctx.stroke();

  ctx.restore();
}

function drawReticle(x, y) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 20, y);
  ctx.lineTo(x - 8, y);
  ctx.moveTo(x + 8, y);
  ctx.lineTo(x + 20, y);
  ctx.moveTo(x, y - 20);
  ctx.lineTo(x, y - 8);
  ctx.moveTo(x, y + 8);
  ctx.lineTo(x, y + 20);
  ctx.stroke();
  ctx.restore();
}

function updateBirds() {
  for (const bird of birds) {
    if (!bird.alive) continue;
    bird.x += bird.vx;
    bird.flap += 0.18 + state.level * 0.006;
    bird.y += Math.sin(bird.flap * 0.7) * 0.4;

    if (bird.x < -140 || bird.x > W() + 140) {
      bird.alive = false;
      continue;
    }

    const birdRadius = bird.size * 0.85;
    for (const arrow of arrows) {
      if (arrow.stuck) continue;
      const d = Math.hypot(arrow.x - bird.x, arrow.y - bird.y);
      if (d < birdRadius) {
        bird.alive = false;
        arrow.stuck = true;
        arrow.life = 0;
        state.score += 10 + state.level * 2;
        burst(bird.x, bird.y, '#ffd166', 14);
        updateUI();
        if (state.score >= state.level * 120) {
          state.level++;
          state.arrows += 3;
          showMsg('Level up!\nBirds are faster now.', 1100);
          if (state.level > 8) {
            endGame(true);
          }
        }
        break;
      }
    }
  }

  for (let i = birds.length - 1; i >= 0; i--) {
    if (!birds[i].alive) birds.splice(i, 1);
  }
}

function updateArrows() {
  for (const arrow of arrows) {
    if (arrow.stuck) continue;
    arrow.trail.unshift({ x: arrow.x, y: arrow.y });
    if (arrow.trail.length > 18) arrow.trail.pop();
    const wind = Math.sin(windPhase + arrow.y * 0.003) * 0.02;
    arrow.vy += arrow.gravity;
    arrow.vx += wind;
    arrow.vx *= arrow.drag;
    arrow.vy *= arrow.drag;
    arrow.x += arrow.vx;
    arrow.y += arrow.vy;
    arrow.angle = Math.atan2(arrow.vy, arrow.vx);
    arrow.speed = Math.hypot(arrow.vx, arrow.vy);
    arrow.life--;
    if (arrow.life <= 0 || arrow.x < -80 || arrow.x > W() + 80 || arrow.y > H() + 100) {
      arrow.stuck = true;
    }
  }

  for (let i = arrows.length - 1; i >= 0; i--) {
    if (arrows[i].stuck) arrows.splice(i, 1);
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life -= 0.02;
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

function drawBackground() {
  const w = W();
  const h = H();
  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, '#10243f');
  sky.addColorStop(0.42, '#2d6cdf');
  sky.addColorStop(0.74, '#79c8f6');
  sky.addColorStop(1, '#c9e8ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.shadowColor = 'rgba(255,255,255,0.5)';
  ctx.shadowBlur = 50;
  ctx.beginPath();
  ctx.arc(w * 0.83, 72, 38, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, h * 0.68, w, h * 0.32);
  ctx.restore();

  const horizon = ctx.createLinearGradient(0, h * 0.75, 0, h);
  horizon.addColorStop(0, '#5ea95e');
  horizon.addColorStop(1, '#2d6a4f');
  ctx.fillStyle = horizon;
  ctx.fillRect(0, h * 0.83, w, h * 0.17);

  for (const cloud of clouds) {
    cloud.x += cloud.speed;
    if (cloud.x > w + 160) cloud.x = -160;
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(cloud.x, cloud.y, cloud.w, cloud.h, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x - cloud.w * 0.42, cloud.y + 5, cloud.w * 0.58, cloud.h * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x + cloud.w * 0.42, cloud.y + 5, cloud.w * 0.58, cloud.h * 0.72, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function loop() {
  windPhase += 0.01;
  drawBackground();

  if (!state.gameOver) {
    spawnTimer++;
    const spawnRate = Math.max(24, 96 - state.level * 8);
    if (spawnTimer >= spawnRate) {
      spawnTimer = 0;
      spawnBird();
      if (state.level > 2 && Math.random() < 0.4) spawnBird();
    }

    if (birds.length < 3 && spawnTimer > 12) {
      spawnBird(true);
    }

    updateBirds();
    updateArrows();
    updateParticles();
  }

  for (const bird of birds) {
    birdShape(bird);
  }

  for (const arrow of arrows) {
    if (arrow.trail.length > 1) {
      ctx.save();
      const trailAlpha = 0.15 + Math.min(0.35, arrow.speed * 0.025);
      ctx.strokeStyle = `rgba(247, 220, 180, ${trailAlpha})`;
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(arrow.trail[0].x, arrow.trail[0].y);
      for (let i = 1; i < arrow.trail.length; i++) ctx.lineTo(arrow.trail[i].x, arrow.trail[i].y);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,220,170,0.18)';
      for (let i = 0; i < Math.min(5, arrow.trail.length); i++) {
        const pt = arrow.trail[i];
        ctx.globalAlpha = 0.22 - i * 0.03;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 3.2 - i * 0.35, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    drawArrow(arrow);
  }

  const bowX = W() * 0.5;
  const bowY = H() * 0.84;
  const aimX = state.aimed ? state.aimX : bowX;
  const aimY = state.aimed ? state.aimY : bowY - 120;
  drawCrossbow(bowX, bowY, aimX, aimY);

  if (state.aimed) drawReticle(aimX, aimY);

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.38)';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 6]);
  ctx.beginPath();
  ctx.arc(bowX, bowY, 46, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (!state.gameOver && state.arrows <= 0 && arrows.length === 0) {
    endGame(birds.length === 0 && state.score > 0);
  }

  requestAnimationFrame(loop);
}

function setAimFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const point = e.touches ? e.touches[0] : e;
  state.aimX = point.clientX - rect.left;
  state.aimY = point.clientY - rect.top;
  state.aimed = true;
}

canvas.addEventListener('pointerdown', e => {
  setAimFromEvent(e);
  shootArrow();
});

canvas.addEventListener('pointermove', e => {
  if (e.buttons || e.pointerType === 'touch' || e.pointerType === 'pen') setAimFromEvent(e);
});

canvas.addEventListener('pointerleave', () => {
  state.aimed = false;
});

document.getElementById('power-btn').addEventListener('click', () => {
  state.throwMode = (state.throwMode + 1) % 3;
  updateUI();
  showMsg(`Throw set to ${['Low', 'Mid', 'High'][state.throwMode]}`, 700);
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Spacebar' || e.key === 'Enter') {
    shootArrow();
    e.preventDefault();
  }
  if (e.key === '1') { state.throwMode = 0; updateUI(); }
  if (e.key === '2') { state.throwMode = 1; updateUI(); }
  if (e.key === '3') { state.throwMode = 2; updateUI(); }
  if ((e.key === 'r' || e.key === 'R') && state.gameOver) location.reload();
});

window.addEventListener('pointermove', e => {
  if (e.pointerType !== 'mouse') return;
  const rect = canvas.getBoundingClientRect();
  state.aimX = e.clientX - rect.left;
  state.aimY = e.clientY - rect.top;
  state.aimed = true;
});

state.aimX = W() * 0.5;
state.aimY = H() * 0.35;
spawnBird(true);
spawnBird(true);
spawnBird(true);
updateUI();
loop();
</script>
</body>
</html>
